<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple_Resume - 在线简历生成器 v1.13</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-left" style="display: flex; align-items: center; gap: 20px;">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-magic"></i></div>
                <span data-i18n="app_title">Simple_Resume</span> <span class="badge" data-i18n="app_badge">青春版</span>
            </div>
            
            <div class="history-actions" style="display: flex; gap: 8px; border-left: 1px solid #e5e7eb; padding-left: 20px;">
                <button id="btn-undo" class="btn btn-outline" style="padding: 8px 14px;" title="撤销 (Ctrl+Z)" disabled><i class="fas fa-undo"></i></button>
                <button id="btn-redo" class="btn btn-outline" style="padding: 8px 14px;" title="重做 (Ctrl+Y)" disabled><i class="fas fa-redo"></i></button>
            </div>
        </div>

        <div class="actions">
            <button id="btn-toggle-lang" class="btn btn-outline" style="margin-right: 15px;">
                <i class="fas fa-language"></i> <span id="lang-text">EN</span>
            </button>
            <button id="btn-pre-export" class="btn btn-primary"><i class="fas fa-download"></i> <span data-i18n="export_pdf">导出高清 PDF</span></button>
        </div>
    </header>

    <div class="app-container">
        <div class="panel sidebar">
            <div class="tabs">
                <button class="tab-btn active" data-target="tab-layout" data-i18n="tab_layout">排版设置</button>
                <button class="tab-btn" data-target="tab-modules" data-i18n="tab_modules">模块管理</button>
            </div>

            <div id="tab-layout" class="tab-content active">
                <button class="btn btn-primary" id="btn-smart-fit" style="width: 100%; margin-bottom: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;">
                    <i class="fas fa-wand-magic-sparkles"></i> <span data-i18n="smart_fit">智能一键铺满纸张</span>
                </button>

                <div class="control-group">
                    <label data-i18n="tpl_select">排版风格</label>
                    <div class="template-selector">
                        <div class="tpl-card active" data-tpl="tpl-left" data-i18n="tpl_left">左对齐</div>
                        <div class="tpl-card" data-tpl="tpl-center" data-i18n="tpl_center">居中对齐</div>
                        <div class="tpl-card" data-tpl="tpl-right" data-i18n="tpl_right">右对齐</div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <label data-i18n="bg_color">简历背景颜色</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="config-bg-color">
                        <div class="swatches">
                            <div class="swatch" style="background-color: #ffffff;" onclick="setBgColor('#ffffff')" title="纯白"></div>
                            <div class="swatch" style="background-color: #FAF9F6;" onclick="setBgColor('#FAF9F6')" title="高级米白"></div>
                            <div class="swatch" style="background-color: #FFF0F5;" onclick="setBgColor('#FFF0F5')" title="茱萸浅粉"></div>
                            <div class="swatch" style="background-color: #F0FDF4;" onclick="setBgColor('#F0FDF4')" title="薄荷浅绿"></div>
                            <div class="swatch" style="background-color: #F0F9FF;" onclick="setBgColor('#F0F9FF')" title="云雾浅蓝"></div>
                            <div class="swatch" style="background-color: #F8F9FA;" onclick="setBgColor('#F8F9FA')" title="极简浅灰"></div>
                        </div>
                    </div>
                </div>
                
                <div class="divider"></div>

                <div class="control-group">
                    <label data-i18n="font_hierarchy">字体排版层级</label>
                    <div class="font-settings-group">
                        <div class="font-row">
                            <div class="font-label" data-i18n="font_name">大标题</div>
                            <select id="sel-font-name" class="font-select">
                                <option value="system-ui, -apple-system, sans-serif" data-i18n="font_sans">默认黑体</option>
                                <option value="'SimSun', 'STSong', serif" data-i18n="font_serif">经典宋体</option>
                                <option value="'KaiTi', 'STKaiti', serif" data-i18n="font_kai">优雅楷体</option>
                            </select>
                            <div class="stepper-wrap compact">
                                <button class="step-btn decrease" id="btn-dec-name">-</button>
                                <input type="number" id="inp-size-name" class="num-display">
                                <button class="step-btn increase" id="btn-inc-name">+</button>
                            </div>
                            <button class="btn-bold" id="btn-bold-name">B</button>
                        </div>
                        <div class="font-row">
                            <div class="font-label" data-i18n="font_title">一级标题</div>
                            <select id="sel-font-title" class="font-select">
                                <option value="system-ui, -apple-system, sans-serif" data-i18n="font_sans">默认黑体</option>
                                <option value="'SimSun', 'STSong', serif" data-i18n="font_serif">经典宋体</option>
                                <option value="'KaiTi', 'STKaiti', serif" data-i18n="font_kai">优雅楷体</option>
                            </select>
                            <div class="stepper-wrap compact">
                                <button class="step-btn decrease" id="btn-dec-title">-</button>
                                <input type="number" id="inp-size-title" class="num-display">
                                <button class="step-btn increase" id="btn-inc-title">+</button>
                            </div>
                            <button class="btn-bold" id="btn-bold-title">B</button>
                        </div>
                        <div class="font-row">
                            <div class="font-label" data-i18n="font_sub">二级标题</div>
                            <select id="sel-font-sub" class="font-select">
                                <option value="system-ui, -apple-system, sans-serif" data-i18n="font_sans">默认黑体</option>
                                <option value="'SimSun', 'STSong', serif" data-i18n="font_serif">经典宋体</option>
                                <option value="'KaiTi', 'STKaiti', serif" data-i18n="font_kai">优雅楷体</option>
                            </select>
                            <div class="stepper-wrap compact">
                                <button class="step-btn decrease" id="btn-dec-sub">-</button>
                                <input type="number" id="inp-size-sub" class="num-display">
                                <button class="step-btn increase" id="btn-inc-sub">+</button>
                            </div>
                            <button class="btn-bold" id="btn-bold-sub">B</button>
                        </div>
                        <div class="font-row">
                            <div class="font-label" data-i18n="font_text">全局正文</div>
                            <select id="sel-font-text" class="font-select">
                                <option value="system-ui, -apple-system, sans-serif" data-i18n="font_sans">默认黑体</option>
                                <option value="'SimSun', 'STSong', serif" data-i18n="font_serif">经典宋体</option>
                                <option value="'KaiTi', 'STKaiti', serif" data-i18n="font_kai">优雅楷体</option>
                            </select>
                            <div class="stepper-wrap compact">
                                <button class="step-btn decrease" id="btn-dec-text">-</button>
                                <input type="number" id="inp-size-text" class="num-display">
                                <button class="step-btn increase" id="btn-inc-text">+</button>
                            </div>
                            <button class="btn-bold" id="btn-bold-text">B</button>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <label data-i18n="line_height">全局行高</label>
                    <div class="stepper-slider-group">
                        <input type="range" id="slider-line-height" min="1.0" max="2.5" step="0.1">
                        <div class="stepper-wrap" id="stepper-line-height">
                            <button class="step-btn decrease">-</button>
                            <input type="number" step="0.1" class="num-display">
                            <button class="step-btn increase">+</button>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label data-i18n="margin_v">上下页边距 (mm)</label>
                    <div class="stepper-slider-group">
                        <input type="range" id="slider-margin-v" min="5" max="40" step="1">
                        <div class="stepper-wrap" id="stepper-margin-v">
                            <button class="step-btn decrease">-</button>
                            <input type="number" step="1" class="num-display">
                            <button class="step-btn increase">+</button>
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <label data-i18n="margin_h">左右页边距 (mm)</label>
                    <div class="stepper-slider-group">
                        <input type="range" id="slider-margin-h" min="5" max="40" step="1">
                        <div class="stepper-wrap" id="stepper-margin-h">
                            <button class="step-btn decrease">-</button>
                            <input type="number" step="1" class="num-display">
                            <button class="step-btn increase">+</button>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label data-i18n="mod_spacing">模块间距 (px)</label>
                    <div class="stepper-slider-group">
                        <input type="range" id="slider-module-spacing" min="5" max="30" step="1">
                        <div class="stepper-wrap" id="stepper-module-spacing">
                            <button class="step-btn decrease">-</button>
                            <input type="number" step="1" class="num-display">
                            <button class="step-btn increase">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-modules" class="tab-content">
                <p class="hint"><i class="fas fa-lightbulb"></i> <span data-i18n="drag_hint">拖拽左侧图标排序，点击眼睛隐藏。</span></p>
                <ul id="module-list" class="module-list"></ul>
                <div class="divider"></div>
                <div class="add-module-actions">
                    <button class="btn btn-outline" style="width: 100%; margin-bottom: 12px;" onclick="addNewModule('list')"><i class="fas fa-plus"></i> <span data-i18n="add_list">新增经历模块</span></button>
                    <button class="btn btn-outline" style="width: 100%;" onclick="addNewModule('text')"><i class="fas fa-plus"></i> <span data-i18n="add_text">新增文本模块</span></button>
                </div>
            </div>
        </div>

        <div class="panel editor">
            <h3 id="editor-header" data-i18n="mod_edit">模块编辑</h3>
            <div id="dynamic-editor-area">
                <div class="empty-state">
                    <i class="fas fa-ghost" style="font-size: 30px; color: #cbd5e1; margin-bottom: 10px; display: block;"></i>
                    <span data-i18n="select_mod_hint">请在左侧选择一个模块进行编辑</span>
                </div>
            </div>
        </div>

        <div class="panel preview-container">
            <div class="preview-scroll-area">
                <div class="resume-viewport">
                    <div id="resume-paper" class="resume-paper tpl-left">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="a4-measure" style="width: 210mm; height: 297mm; position: absolute; visibility: hidden; z-index: -999;"></div>

    <div id="export-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="modal_export_title">PDF 导出确认</h3>
                <button class="btn-close" onclick="closeExportModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-warning">
                    <i class="fas fa-check-circle" style="color: #10b981;"></i>
                    <p data-i18n="modal_warning_text" style="color: #065f46;">已开启超精细行级物理分页引擎，文字边界已被绝对保护。如果觉得最后一页太空，可以点击左侧的“智能一键铺满”。</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeExportModal()" data-i18n="btn_cancel">再调调</button>
                <button class="btn btn-primary" id="btn-export-pdf"><i class="fas fa-file-pdf"></i> <span data-i18n="btn_confirm_export">确认无误并导出</span></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
